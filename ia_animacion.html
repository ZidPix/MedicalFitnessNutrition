<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La IA Revoluciona la Animación</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Arial Black', 'Impact', sans-serif; overflow: hidden; }

  #animation-container {
    width: 640px;
    height: 360px;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  .scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .scene.active { opacity: 1; pointer-events: all; }

  /* ── Barra de progreso ── */
  #progress-bar {
    width: 640px;
    height: 6px;
    background: #333;
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #00ccff);
    width: 0%;
    transition: width 0.1s linear;
    border-radius: 3px;
  }

  #scene-label {
    color: #888;
    font-size: 12px;
    margin-top: 8px;
    letter-spacing: 2px;
    font-family: monospace;
  }

  /* ════════════════════════════════
     ESCENA 0 – INTRO TÍTULO
  ════════════════════════════════ */
  #s0 { background: #0a0a1a; }
  #s0 svg { width: 100%; height: 100%; }

  /* ════════════════════════════════
     ESCENA 1 – ANIMADOR TRADICIONAL
  ════════════════════════════════ */
  #s1 { background: #c62828; }
  #s1 svg { width: 100%; height: 100%; }

  /* ════════════════════════════════
     ESCENA 2 – LLEGA LA IA
  ════════════════════════════════ */
  #s2 { background: #1b5e20; }
  #s2 svg { width: 100%; height: 100%; }

  /* ════════════════════════════════
     ESCENA 3 – BENEFICIOS
  ════════════════════════════════ */
  #s3 { background: #0d47a1; }
  #s3 svg { width: 100%; height: 100%; }

  /* ════════════════════════════════
     ESCENA 4 – CONTROVERSIA
  ════════════════════════════════ */
  #s4 { background: #4a148c; }
  #s4 svg { width: 100%; height: 100%; }

  /* ════════════════════════════════
     ESCENA 5 – CONCLUSIÓN
  ════════════════════════════════ */
  #s5 { background: #212121; }
  #s5 svg { width: 100%; height: 100%; }

  /* ── Animations ── */
  @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes pulse  { 0%,100%{transform:scale(1)}    50%{transform:scale(1.06)} }
  @keyframes slideInLeft { from{transform:translateX(-120px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes slideInRight { from{transform:translateX(120px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes slideInUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes rotateGear { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
  @keyframes sweat { 0%,100%{opacity:0;transform:translateY(0)} 50%{opacity:1;transform:translateY(8px)} }
  @keyframes zap { 0%,100%{opacity:0} 10%,30%,50%{opacity:1} 20%,40%{opacity:0.3} }
  @keyframes countUp { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
  @keyframes typewriter { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }

  .float   { animation: floatY 2s ease-in-out infinite; }
  .pulse-a { animation: pulse 1.5s ease-in-out infinite; }
  .gear    { transform-origin: center; animation: rotateGear 3s linear infinite; }
  .gear-slow { transform-origin: center; animation: rotateGear 6s linear infinite reverse; }
  .blink-eye { animation: blink 3s ease-in-out infinite; transform-origin: center; }
  .sweat-drop { animation: sweat 1.2s ease-in infinite; }
  .slide-left  { animation: slideInLeft 0.6s ease-out both; }
  .slide-right { animation: slideInRight 0.6s ease-out both; }
  .slide-up    { animation: slideInUp 0.5s ease-out both; }
  .shake-a { animation: shake 0.4s ease-in-out infinite; }
  .count-a { animation: countUp 0.4s ease-out both; }
</style>
</head>
<body>

<div id="animation-container">

  <!-- ══════════ ESCENA 0: INTRO ══════════ -->
  <div class="scene active" id="s0">
    <svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
      <!-- Fondo estrellado -->
      <rect width="640" height="360" fill="#0a0a1a"/>
      <!-- Estrellas -->

        <circle cx="90" cy="280" r="1"/><circle cx="550" cy="300" r="2"/>
        <circle cx="400" cy="330" r="1"/><circle cx="160" cy="340" r="1.5"/>
      </g>
      <!-- Círculo neón de fondo -->
      <circle cx="320" cy="170" r="130" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
      <circle cx="320" cy="170" r="110" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.2"/>

      <!-- Cerebro IA central (icono simple) -->
      <g class="float" style="transform-origin:320px 170px">

        <ellipse cx="320" cy="155" rx="55" ry="50" fill="#1a237e"/>

        <!-- circuitos -->

        <line x1="310" y1="165" x2="330" y2="165" stroke="#00ccff" stroke-width="2"/>
        <line x1="330" y1="165" x2="340" y2="155" stroke="#00ccff" stroke-width="2"/>
        <circle cx="300" cy="145" r="4" fill="#00ff88"/>
        <circle cx="340" cy="135" r="4" fill="#00ff88"/>
        <circle cx="310" cy="165" r="4" fill="#00ccff"/>
        <circle cx="340" cy="155" r="4" fill="#00ccff"/>
        <!-- ojos LED -->
        <ellipse cx="305" cy="155" rx="7" ry="7" fill="#00ccff" opacity="0.9"/>
        <ellipse cx="335" cy="155" rx="7" ry="7" fill="#00ccff" opacity="0.9"/>
        <circle cx="305" cy="155" r="3" fill="white"/>
        <circle cx="335" cy="155" r="3" fill="white"/>
        <!-- boca -->
        <rect x="308" y="172" width="24" height="4" rx="2" fill="#00ff88"/>
      </g>

      <!-- Título principal -->
      <text x="320" y="248" text-anchor="middle" fill="white"
        font-family="'Arial Black',Impact,sans-serif" font-size="26" font-weight="900"
        style="animation:slideInUp 0.7s 0.2s ease-out both">
        LA IA REVOLUCIONA
      </text>
      <text x="320" y="278" text-anchor="middle" fill="#00ff88"
        font-family="'Arial Black',Impact,sans-serif" font-size="26" font-weight="900"
        style="animation:slideInUp 0.7s 0.4s ease-out both">
        LA ANIMACIÓN
      </text>
      <!-- Subtítulo -->
      <text x="320" y="310" text-anchor="middle" fill="#aaa"
        font-family="Arial,sans-serif" font-size="11"
        style="animation:slideInUp 0.7s 0.7s ease-out both">
        ¿REVOLUCIÓN O AMENAZA?
      </text>

      <!-- Destellos decorativos -->
      <g style="animation:sparkle 2s 0.5s ease-in-out infinite">
        <polygon points="70,80 73,90 83,90 75,96 78,106 70,100 62,106 65,96 57,90 67,90" fill="#FFD700" opacity="0.8"/>
      </g>
      <g style="animation:sparkle 2s 1.2s ease-in-out infinite">
        <polygon points="570,70 573,80 583,80 575,86 578,96 570,90 562,96 565,86 557,80 567,80" fill="#FFD700" opacity="0.8"/>
      </g>
    </svg>
  </div>

  <!-- ══════════ ESCENA 1: ANIMADOR TRADICIONAL ══════════ -->
  <div class="scene" id="s1">
    <svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
      <rect width="640" height="360" fill="#c62828"/>
      <!-- Fondo escritorio -->
      <rect x="0" y="260" width="640" height="100" fill="#5d1a1a"/>
      <rect x="0" y="255" width="640" height="12" fill="#7b2020"/>

      <!-- Pilas de papel (izquierda) -->
      <g style="animation:slideInLeft 0.5s ease-out both">
        <rect x="30" y="200" width="90" height="12" rx="2" fill="#fff9c4"/>
        <rect x="33" y="190" width="90" height="12" rx="2" fill="#fff176"/>
        <rect x="28" y="180" width="90" height="12" rx="2" fill="#fff9c4"/>
        <rect x="35" y="170" width="90" height="12" rx="2" fill="#fff176"/>
        <rect x="30" y="160" width="90" height="12" rx="2" fill="#fff9c4"/>
        <rect x="25" y="150" width="90" height="12" rx="2" fill="#fff176"/>
        <text x="75" y="242" text-anchor="middle" fill="#FFD700" font-family="'Arial Black'" font-size="10">1000+ FRAMES</text>
      </g>

      <!-- Mesa de luz -->
      <rect x="150" y="230" width="340" height="30" rx="6" fill="#1565c0" opacity="0.9"/>
      <rect x="160" y="180" width="320" height="55" rx="4" fill="#bbdefb" opacity="0.7"/>
      <!-- luz parpadeando -->

      <!-- Personaje animador (chibi) -->
      <g class="slide-right" style="animation-delay:0.2s; transform-origin:400px 200px">
        <!-- cuerpo -->
        <rect x="370" y="185" width="60" height="70" rx="12" fill="#ff8f00"/>
        <!-- cuello -->
        <rect x="388" y="178" width="24" height="14" rx="4" fill="#ffcc80"/>
        <!-- cabeza grande -->
        <ellipse cx="400" cy="148" rx="45" ry="42" fill="#ffcc80"/>
        <!-- cabello -->
        <ellipse cx="400" cy="112" rx="44" ry="18" fill="#4e342e"/>
        <rect x="357" y="112" width="14" height="30" rx="7" fill="#4e342e"/>
        <rect x="429" y="112" width="14" height="30" rx="7" fill="#4e342e"/>
        <!-- orejas -->
        <ellipse cx="356" cy="148" rx="8" ry="10" fill="#ffcc80"/>
        <ellipse cx="444" cy="148" rx="8" ry="10" fill="#ffcc80"/>
        <!-- ojos ojeras agotado -->
        <ellipse cx="385" cy="148" rx="12" ry="10" fill="white"/>
        <ellipse cx="415" cy="148" rx="12" ry="10" fill="white"/>
        <ellipse cx="385" cy="150" rx="7" ry="7" fill="#5d4037" class="blink-eye"/>
        <ellipse cx="415" cy="150" rx="7" ry="7" fill="#5d4037" class="blink-eye"/>
        <circle cx="383" cy="148" r="3" fill="black"/>
        <circle cx="413" cy="148" r="3" fill="black"/>
        <!-- ojeras -->
        <ellipse cx="385" cy="156" rx="10" ry="4" fill="#795548" opacity="0.3"/>
        <ellipse cx="415" cy="156" rx="10" ry="4" fill="#795548" opacity="0.3"/>
        <!-- boca cansado -->
        <path d="M388 165 Q400 162 412 165" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- lápiz en mano -->
        <rect x="425" y="200" width="6" height="40" rx="3" fill="#ffeb3b" transform="rotate(-20,428,220)"/>
        <polygon points="425,240 431,240 428,250" fill="#ff7043" transform="rotate(-20,428,240)"/>
        <!-- brazo -->
        <rect x="420" y="195" width="16" height="35" rx="8" fill="#ff8f00"/>
      </g>

      <!-- Gotas de sudor -->
      <g class="sweat-drop" style="animation-delay:0s">
        <ellipse cx="450" cy="120" rx="5" ry="7" fill="#4fc3f7" opacity="0.8"/>
      </g>
      <g class="sweat-drop" style="animation-delay:0.4s">
        <ellipse cx="465" cy="135" rx="4" ry="6" fill="#4fc3f7" opacity="0.8"/>
      </g>
      <g class="sweat-drop" style="animation-delay:0.8s">
        <ellipse cx="355" cy="125" rx="4" ry="6" fill="#4fc3f7" opacity="0.8"/>
      </g>

      <!-- Reloj con manecillas girando rápido -->
      <g style="animation:slideInLeft 0.5s 0.3s ease-out both">
        <circle cx="565" cy="100" r="35" fill="#fff" stroke="#555" stroke-width="3"/>
        <line x1="565" y1="100" x2="565" y2="72" stroke="#333" stroke-width="3" stroke-linecap="round"

        font-family="Arial" font-size="13">
        Miles de horas dibujando cuadro por cuadro...
      </text>
    </svg>
  </div>

  <!-- ══════════ ESCENA 2: LLEGA LA IA ══════════ -->
  <div class="scene" id="s2">

      </text>

      <!-- Robot IA (centro, grande) -->
      <g class="float" style="transform-origin:320px 190px">
        <!-- cuerpo robot -->
        <rect x="278" y="185" width="84" height="90" rx="10" fill="#263238"/>
        <!-- panel pecho -->
        <rect x="288" y="198" width="64" height="50" rx="6" fill="#00acc1"/>
        <!-- indicadores pecho -->

        <circle cx="320" cy="213" r="5" fill="#00ccff" style="animation:pulse 0.8s ease-in-out infinite"/>
        <circle cx="338" cy="213" r="5" fill="#ffeb3b" style="animation:pulse 1.2s ease-in-out infinite"/>
        <rect x="294" y="228" width="52" height="8" rx="4" fill="#4dd0e1"/>
        <rect x="294" y="240" width="32" height="5" rx="2" fill="#80deea"/>
        <!-- cuello -->
        <rect x="302" y="175" width="36" height="16" rx="5" fill="#37474f"/>
        <!-- cabeza robot -->
        <rect x="268" y="120" rx="16" ry="16" width="104" height="72" fill="#37474f"/>
        <!-- antena -->
        <line x1="320" y1="120" x2="320" y2="95" stroke="#78909c" stroke-width="4"/>
        <circle cx="320" cy="90" r="8" fill="#00ff88" style="animation:pulse 0.6s ease-in-out infinite"/>
        <!-- ojos robot -->
        <rect x="282" y="138" width="34" height="22" rx="8" fill="#00ccff" opacity="0.9"/>
        <rect x="324" y="138" width="34" height="22" rx="8" fill="#00ccff" opacity="0.9"/>
        <circle cx="299" cy="149" r="7" fill="white"/>
        <circle cx="341" cy="149" r="7" fill="white"/>
        <circle cx="299" cy="149" r="4" fill="#0d47a1"/>
        <circle cx="341" cy="149" r="4" fill="#0d47a1"/>
        <!-- boca robot -->
        <rect x="293" y="173" width="54" height="10" rx="5" fill="#546e7a"/>
        <rect x="297" y="175" width="10" height="6" rx="2" fill="#00ff88"/>
        <rect x="311" y="175" width="10" height="6" rx="2" fill="#00ff88"/>
        <rect x="325" y="175" width="10" height="6" rx="2" fill="#00ff88"/>
        <!-- brazos -->
        <rect x="230" y="190" width="52" height="18" rx="9" fill="#37474f"/>
        <rect x="358" y="190" width="52" height="18" rx="9" fill="#37474f"/>
        <!-- manos -->

        <rect x="22" y="82" width="126" height="31" rx="7" fill="#388e3c"/>
        <text x="85" y="101" text-anchor="middle" fill="white" font-family="'Arial Black'" font-size="11">🎬 ROTOSCOPIA</text>
      </g>

          <circle cx="570" cy="200" r="12" fill="#2e7d32"/>
          <rect x="565" y="173" width="10" height="13" rx="4" fill="#4caf50"/>
          <rect x="565" y="214" width="10" height="13" rx="4" fill="#4caf50"/>
          <rect x="543" y="195" width="13" height="10" rx="4" fill="#4caf50"/>

        </g>
      </g>

      <text x="320" y="345" text-anchor="middle" fill="#a5d6a7"
        font-family="Arial" font-size="12">
        La IA automatiza procesos que antes tomaban semanas
      </text>
    </svg>
  </div>

  <!-- ══════════ ESCENA 3: BENEFICIOS ══════════ -->
  <div class="scene" id="s3">
    <svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
      <rect width="640" height="360" fill="#0d47a1"/>
      <rect x="0" y="0" width="640" height="45" fill="#01579b"/>
      <rect x="0" y="42" width="640" height="5" fill="#29b6f6"/>
      <text x="320" y="32" text-anchor="middle" fill="white"
        font-family="'Arial Black',Impact" font-size="22" font-weight="900">
        ✅ BENEFICIOS DE LA IA
      </text>

      <!-- BENEFICIO 1: Velocidad -->
      <g style="animation:slideInLeft 0.6s 0.1s ease-out both">
        <rect x="30" y="65" width="270" height="110" rx="14" fill="#0277bd"/>
        <rect x="35" y="70" width="260" height="100" rx="12" fill="#0288d1"/>

<!-- Progress bar -->
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="scene-label">ESCENA 1 DE 6</div>

<script>
  const scenes = document.querySelectorAll('.scene');
  const fill   = document.getElementById('progress-fill');
  const label  = document.getElementById('scene-label');

  const NAMES = [
    'INTRO',
    'ANIMACIÓN TRADICIONAL',
    'LLEGA LA IA',
    'BENEFICIOS',
    'CONTROVERSIA',
    'CONCLUSIÓN'
  ];
  const DURATIONS = [3500, 4500, 4500, 5000, 5000, 5000]; // ms per scene
  const TOTAL = DURATIONS.reduce((a,b) => a+b, 0);

  let currentScene = 0;
  let elapsed = 0;
  let startTime = performance.now();
  let sceneStart = 0;
  let rafId;

  function showScene(idx) {
    scenes.forEach((s, i) => s.classList.toggle('active', i === idx));
    label.textContent = `${NAMES[idx]}  ·  ${idx+1} / ${scenes.length}`;
  }

  function tick(now) {
    elapsed = now - startTime;
    // Global progress
    const pct = Math.min(elapsed / TOTAL * 100, 100);
    fill.style.width = pct + '%';

    // Scene switching
    const sceneElapsed = now - sceneStart;
    if (currentScene < scenes.length - 1 && sceneElapsed >= DURATIONS[currentScene]) {
      currentScene++;
      sceneStart = now;
      showScene(currentScene);
    }

    if (elapsed < TOTAL + 500) {
      rafId = requestAnimationFrame(tick);
    } else {
      // Loop: reset
      currentScene = 0;
      elapsed = 0;
      startTime = performance.now();
      sceneStart = startTime;
      showScene(0);
      rafId = requestAnimationFrame(tick);
    }
  }

  showScene(0);
  sceneStart = performance.now();
  startTime  = performance.now();
  rafId = requestAnimationFrame(tick);

  // Click to advance
  document.getElementById('animation-container').addEventListener('click', () => {
    if (currentScene < scenes.length - 1) {
      currentScene++;
      sceneStart = performance.now();
      showScene(currentScene);
    } else {
      currentScene = 0;
      startTime = performance.now();
      sceneStart = startTime;
      showScene(0);
    }
  });
</script>
